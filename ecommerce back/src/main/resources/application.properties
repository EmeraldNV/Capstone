spring.application.name=${SPRING_APPLICATION_NAME}
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO}
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT}
spring.jpa.open-in-view=${SPRING_JPA_OPEN_IN_VIEW}
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED}
spring.flyway.baseline-on-migrate=${SPRING_FLYWAY_BASELINE_ON_MIGRATE}
spring.flyway.locations=${SPRING_FLYWAY_LOCATIONS}

app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-ttl=${APP_JWT_ACCESS_TOKEN_TTL}
app.bootstrap.admin.enabled=${BOOTSTRAP_ADMIN_ENABLED}
app.bootstrap.admin.email=${BOOTSTRAP_ADMIN_EMAIL}
app.bootstrap.admin.password=${BOOTSTRAP_ADMIN_PASSWORD}
app.frontend.base-url=${FRONTEND_BASE_URL}
app.resend.enabled=${RESEND_ENABLED}
app.resend.api-key=${RESEND_API_KEY}
app.resend.from-email=${RESEND_FROM_EMAIL}
app.resend.base-url=${RESEND_BASE_URL}
app.media.storage-path=${MEDIA_STORAGE_PATH}
app.stripe.secret-key=${STRIPE_SECRET_KEY}
app.stripe.publishable-key=${STRIPE_PUBLISHABLE_KEY}
app.stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET}
app.stripe.success-path=${STRIPE_SUCCESS_PATH}
app.stripe.cancel-path=${STRIPE_CANCEL_PATH}

spring.servlet.multipart.max-file-size=${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE}
spring.servlet.multipart.max-request-size=${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE}
